on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/aria2/aria2.git
  REPO_BRANCH: master
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install libc-ares-dev libssl-dev zlib1g-dev libexpat1-dev libssh2-1-dev libsqlite3-dev pkg-config autoconf automake autotools-dev autopoint libtool libcppunit-dev libxml2-dev
        sudo -E apt-get -qq autoremove --purge 
        sudo -E apt-get -qq clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH Aria2
        ln -sf /workdir/Aria2 $GITHUB_WORKSPACE/Aria2

    - name: Compile the firmware
      id: compile
      run: |
        cd Aria2
        autoreconf -i
        make

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      path: src/aria2c/*

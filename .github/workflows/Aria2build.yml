on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/aria2/aria2.git
  REPO_BRANCH: master
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install \
          g++-8 \
          autoconf \
          automake \
          autotools-dev \
          autopoint \
          libtool \
          pkg-config \
          libssl-dev \
          libc-ares-dev \
          zlib1g-dev \
          libsqlite3-dev \
          libssh2-1-dev \
          libcppunit-dev
        sudo -E apt-get -qq autoremove --purge 
        sudo -E apt-get -qq clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH Aria2
        ln -sf /workdir/Aria2 $GITHUB_WORKSPACE/Aria2

    - name: Config
      run: |
        cd Aria2
        test -z "$HOST" && HOST=i686-w64-mingw32
        test -z "$PREFIX" && PREFIX=/usr/local/$HOST
        autoreconf -i
        ./configure \
          --host=$HOST \
          --prefix=$PREFIX \
          --without-included-gettext \
          --disable-nls \
          --with-libcares \
          --without-gnutls \
          --without-openssl \
          --with-sqlite3 \
          --without-libxml2 \
          --with-libexpat \
          --with-libz \
          --with-libgmp \
          --with-libssh2 \
          --without-libgcrypt \
          --without-libnettle \
          --with-cppunit-prefix=$PREFIX \
          ARIA2_STATIC=yes \
          CPPFLAGS="-I$PREFIX/include" \
          LDFLAGS="-L$PREFIX/lib" \
          PKG_CONFIG="/usr/bin/pkg-config" \
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig"
        
        
    - name: Compile
      run: |
        make
        make check

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      with:
        path: $GITHUB_WORKSPACE/src/aria2c/*

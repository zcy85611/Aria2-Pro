on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v2
      
    - name: Initialization environment
      run: |
        curl -fsSL https://get.docker.com -o get-docker.sh
        chmod +x get-docker.sh
        ./get-docker.sh
        git clone https://github.com/aria2/aria2.git
        cp -rf Dockerfile.mingw aria2/Dockerfile.mingw
        cp -r patch aria2
        ls
        cd aria2
        pwd
        git apply patch/*
        
    - name: Compile
      run: |
        #sed -ie '19s/i686/x86_64/g' Dockerfile.mingw
        #sed -ie '14s/19.04/20.04/g' Dockerfile.mingw
        #sed -ie '23s/#//g' Dockerfile.mingw
        #sed -ie '29s/libgcrypt11/libssl/g' Dockerfile.mingw
        #sed -ie '19 aENV DEBIAN_FRONTEND noninteractive' Dockerfile.mingw
        pwd

